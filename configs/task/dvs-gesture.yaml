# @package _global_
defaults:
  - /model: dvs/medium

task:
  name: dvs-gesture-classification

training:
  num_epochs: 200
  per_device_batch_size: 32
  per_device_eval_batch_size: 4
  num_workers: 6
  time_jitter: 5
  spatial_jitter: 0.3
  noise: 0.0
  drop_event: 0.05
  time_skew: 1.12
  max_roll: 32
  max_angle: 10
  max_scale: 1.2
  max_drop_chunk: 0.02
  cut_mix: 0.4
  pad_unit: 65536
  slice_events: 65536
  validate_on_test: true

optimizer:
  ssm_base_lr: 0.000012
  lr_factor: 6
  warmup_epochs: 10
  ssm_weight_decay: 0.0
  weight_decay: 0.02
  schedule: cosine
  accumulation_steps: 1